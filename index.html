<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivid Shorts</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    /* TikTok Mobile Screen Frame Layout */
    .app-container {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      position: relative;
      background: #111;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .app-container::-webkit-scrollbar { display: none; }
    
    .video-card {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .action-sidebar {
      position: absolute;
      right: 15px;
      bottom: 150px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      z-index: 10;
    }
    .action-btn {
      background: rgba(0, 0, 0, 0.6);
      border: none;
      color: white;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 22px;
      cursor: pointer;
    }
    .video-details {
      position: absolute;
      left: 15px;
      bottom: 40px;
      right: 80px;
      z-index: 10;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.9);
    }
    .username { font-weight: bold; font-size: 16px; margin-bottom: 6px; color: #fff; }
    .description { font-size: 14px; color: #e5e5e5; }
    
    /* Global Interactivity Unblock Overlay */
    #start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    #start-overlay h2 { color: #ff007f; margin-bottom: 10px; }
  </style>
</head>
<body>

  <div id="start-overlay" onclick="startApp()">
    <h2>📺 Open Vivid Shorts</h2>
    <p>Tap anywhere to unlock feed and music</p>
  </div>

  <div class="app-container" id="feed">
    <!-- Video Loop 1 -->
    <div class="video-card">
      <video src="https://mixkit.co" loop muted playsinline></video>
      <div class="action-sidebar">
        <button class="action-btn" onclick="this.style.color='#ff007f'">❤️</button>
        <button class="action-btn">💬</button>
      </div>
      <div class="video-details">
        <div class="username">@nature_loops</div>
        <div class="description">Beautiful scenery today! 🌿 #nature #aesthetic</div>
      </div>
    </div>

    <!-- Video Loop 2 -->
    <div class="video-card">
      <video src="https://mixkit.co" loop muted playsinline></video>
      <div class="action-sidebar">
        <button class="action-btn" onclick="this.style.color='#ff007f'">❤️</button>
        <button class="action-btn">💬</button>
      </div>
      <div class="video-details">
        <div class="username">@neon_dancer</div>
        <div class="description">Late night studio sessions 🕺🔥 #dance #neon</div>
      </div>
    </div>
  </div>

  <script>
    const feedContainer = document.getElementById('feed');
    
    function startApp() {
      // Hide the click blocker panel layout
      document.getElementById('start-overlay').style.display = 'none';
      
      // Unmute and play the first visible card item track immediately
      const firstVideo = document.querySelector('video');
      if (firstVideo) {
        firstVideo.muted = false;
        firstVideo.play().catch(e => console.log(e));
      }
    }

    // Monitor scroll alignment actions to swap active loops seamlessly
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target.querySelector('video');
        if (entry.isIntersecting) {
          video.muted = false;
          video.play().catch(() => {});
        } else {
          video.pause();
          video.currentTime = 0;
        }
      });
    }, { root: feedContainer, threshold: 0.6 });

    document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
  </script>
</body>
</html>
