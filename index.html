<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FlickScroll Prototype</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .app-container {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      position: relative;
      background: #111;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .app-container::-webkit-scrollbar { display: none; }
    .video-card {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .action-sidebar {
      position: absolute;
      right: 15px;
      bottom: 120px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      z-index: 10;
    }
    .action-btn {
      background: rgba(0, 0, 0, 0.5);
      border: none;
      color: white;
      width: 45px;
      height: 45px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
    }
    .video-details {
      position: absolute;
      left: 15px;
      bottom: 30px;
      right: 80px;
      z-index: 10;
    }
    .username { font-weight: bold; font-size: 16px; margin-bottom: 5px; }
    .description { font-size: 14px; color: #e5e5e5; }
  </style>
</head>
<body>

  <div class="app-container" id="feed"></div>

  <script>
    const videoData = [
      {
        username: "@nature_loops",
        desc: "Stunning mountain views! #adventure #travel",
        url: "https://mixkit.co"
      },
      {
        username: "@skater_vibes",
        desc: "Testing out the new camera setup today 🛹",
        url: "https://mixkit.co"
      }
    ];

    const feedContainer = document.getElementById('feed');

    videoData.forEach((data) => {
      const card = document.createElement('div');
      card.classList.add('video-card');
      card.innerHTML = `
        <video src="\${data.url}" loop muted playsinline></video>
        <div class="action-sidebar">
          <button class="action-btn">❤️</button>
          <button class="action-btn">💬</button>
        </div>
        <div class="video-details">
          <div class="username">\${data.username}</div>
          <div class="description">\${data.desc}</div>
        </div>
      `;
      feedContainer.appendChild(card);
    });

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target.querySelector('video');
        if (entry.isIntersecting) {
          video.play().catch(() => {});
        } else {
          video.pause();
          video.currentTime = 0;
        }
      });
    }, { root: feedContainer, threshold: 0.6 });

    document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
  </script>
</body>
</html>
