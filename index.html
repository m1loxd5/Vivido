<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vivid Shorts Platform</title>
  <style>
    /* Neon Color Palette & Mobile Frame Settings */
    :root {
      --bg-dark: #0a0a0c;
      --card-bg: #121216;
      --tiktok-pink: #ff004f;
      --tiktok-cyan: #00f2fe;
      --text-white: #ffffff;
      --text-gray: #a9a9b2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background-color: var(--bg-dark);
      color: var(--text-white);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    /* TikTok Mobile Screen Layout Framework */
    .app-container {
      width: 100%;
      max-width: 420px;
      height: 100vh;
      position: relative;
      background: #000;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      scrollbar-width: none;
    }
    .app-container::-webkit-scrollbar { display: none; }
    
    .video-card {
      width: 100%;
      height: 100vh;
      scroll-snap-align: start;
      position: relative;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Floating Action Sidebar Buttons Section */
    .action-sidebar {
      position: absolute;
      right: 12px;
      bottom: 100px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      z-index: 10;
    }

    /* TikTok Profile Circular Avatar UI Element */
    .profile-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      border: 2px solid var(--text-white);
      background: var(--tiktok-pink);
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: bold;
      font-size: 18px;
      margin-bottom: 8px;
      box-shadow: 0 0 8px rgba(255, 0, 79, 0.4);
    }

    .interaction-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .action-btn {
      background: rgba(20, 20, 25, 0.7);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--text-white);
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      transition: transform 0.1s, background-color 0.2s;
    }
    .action-btn:active { transform: scale(0.85); }
    
    .action-btn.liked {
      color: var(--tiktok-pink);
      background: rgba(255, 0, 79, 0.15);
      border-color: var(--tiktok-pink);
      animation: pop 0.3s ease;
    }

    .counter-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-white);
    }

    /* Bottom Info Overlay Template Panel */
    .video-details {
      position: absolute;
      left: 16px;
      bottom: 30px;
      right: 75px;
      z-index: 10;
    }

    .username {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .username::after {
      content: "✓";
      background: var(--tiktok-cyan);
      color: #000;
      font-size: 10px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      display: inline-flex;
      justify-content: center;
      align-items: center;
    }

    .description {
      font-size: 14px;
      color: #f1f1f5;
      line-height: 1.4;
    }

    /* Sliding Comments Drawer Container Layout */
    .comment-drawer {
      position: absolute;
      bottom: -60vh;
      left: 0;
      width: 100%;
      height: 50vh;
      background: var(--card-bg);
      border-radius: 16px 16px 0 0;
      z-index: 20;
      transition: bottom 0.3s ease;
      display: flex;
      flex-direction: column;
      padding: 16px;
      border-top: 1px solid rgba(255,255,255,0.1);
    }
    .comment-drawer.open { bottom: 0; }

    .drawer-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
      font-weight: bold;
    }
    .close-drawer { font-size: 20px; cursor: pointer; color: var(--text-gray); }

    .comments-list {
      flex-1: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 12px;
    }
    .comment-item { font-size: 13px; line-height: 1.4; border-bottom: 1px solid #1c1c24; padding-bottom: 8px; }
    .comment-user { font-weight: bold; color: var(--tiktok-cyan); margin-right: 6px; }

    .comment-input-row {
      display: flex;
      gap: 8px;
    }
    .comment-input-row input {
      flex: 1;
      background: #1c1c24;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 10px 16px;
      color: white;
      outline: none;
    }
    .comment-submit-btn {
      background: var(--tiktok-pink);
      border: none;
      color: white;
      padding: 0 16px;
      border-radius: 20px;
      cursor: pointer;
    }

    /* Notification Alert Bubble UI */
    .toast-alert {
      position: absolute;
      top: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      background: var(--tiktok-cyan);
      color: #000;
      padding: 10px 24px;
      border-radius: 20px;
      font-weight: bold;
      font-size: 14px;
      z-index: 50;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
    }
    .toast-alert.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    #start-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 100;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }
    #start-overlay h2 { color: var(--tiktok-pink); margin-bottom: 8px; }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

  <div id="toast" class="toast-alert">Link copied to clipboard! 🔗</div>

  <div id="start-overlay" onclick="startApp()">
    <h2>📺 Open Vivid Shorts</h2>
    <p>Tap anywhere to unlock feed and sound</p>
  </div>

  <div class="app-container" id="feed">
    
    <!-- Video Post 1 -->
    <div class="video-card" data-id="1">
      <video src="https://mixkit.co" loop muted playsinline></video>
      <div class="action-sidebar">
        <div class="profile-avatar">N</div>
        <div class="interaction-group">
          <button class="action-btn" onclick="handleLike(this)">❤️</button>
          <span class="counter-label count-likes">124</span>
        </div>
        <div class="interaction-group">
          <button class="action-btn" onclick="openComments('1')">💬</button>
          <span class="counter-label count-comments">2</span>
        </div>
        <div class="interaction-group">
          <button class="action-btn" onclick="triggerShare()">✈️</button>
          <span class="counter-label">Share</span>
        </div>
      </div>
      <div class="video-details">
        <div class="username">@nature_loops</div>
        <div class="description">Beautiful scenery today! 🌿 #nature #aesthetic #foryou</div>
      </div>
    </div>

    <!-- Video Post 2 -->
    <div class="video-card" data-id="2">
      <video src="https://mixkit.co" loop muted playsinline></video>
      <div class="action-sidebar">
        <div class="profile-avatar">D</div>
        <div class="interaction-group">
          <button class="action-btn" onclick="handleLike(this)">❤️</button>
          <span class="counter-label count-likes">842</span>
        </div>
        <div class="interaction-group">
          <button class="action-btn" onclick="openComments('2')">💬</button>
          <span class="counter-label count-comments">1</span>
        </div>
        <div class="interaction-group">
          <button class="action-btn" onclick="triggerShare()">✈️</button>
          <span class="counter-label">Share</span>
        </div>
      </div>
      <div class="video-details">
        <div class="username">@neon_dancer</div>
        <div class="description">Late night studio sessions 🕺🔥 #dance #neon #vibes</div>
      </div>
    </div>

  </div>

  <!-- Interactive Pop-up Drawer Structure -->
  <div class="comment-drawer" id="commentDrawer">
    <div class="drawer-header">
      <span>Comments</span>
      <span class="close-drawer" onclick="closeComments()">✕</span>
    </div>
    <div class="comments-list" id="commentsList"></div>
    <div class="comment-input-row">
      <input type="text" id="commentInput" placeholder="Add comment...">
      <button class="comment-submit-btn" onclick="submitComment()">Post</button>
    </div>
  </div>

  <script>
    const feedContainer = document.getElementById('feed');
    let activeVideoId = null;

    // Dummy Database storage to track state changes dynamically
    const commentsDb = {
      "1": [
        { user: "@user77", text: "Wow, so peaceful!" },
        { user: "@traveler_sam", text: "Where was this filmed? 😍" }
      ],
      "2": [
        { user: "@dance_fanatic", text: "Those moves are clean!!" }
      ]
    };

    function startApp() {
      document.getElementById('start-overlay').style.display = 'none';
      const firstVideo = document.querySelector('video');
      if (firstVideo) {
        firstVideo.muted = false;
        firstVideo.play().catch(e => console.log(e));
      }
    }

// Like Counter Toggle Mechanicsfunction handleLike(btn) {const label = btn.nextElementSibling;let count = parseInt(label.innerText);btn.classList.toggle('liked');if (btn.classList.contains('liked')) {label.innerText = count + 1;} else {label.innerText = count - 1;}}// Open Drawer Panels Layout Mappingfunction openComments(id) {activeVideoId = id;const drawer = document.getElementById('commentDrawer');const listContainer = document.getElementById('commentsList');listContainer.innerHTML = "";commentsDb[id].forEach(comment => {const item = document.createElement('div');item.classList.add('comment-item');item.innerHTML = <span class="comment-user">\${comment.user}</span>\${comment.text};listContainer.appendChild(item);});drawer.classList.add('open');}function closeComments() {document.getElementById('commentDrawer').classList.remove('open');}// Dynamic Comments Insertionfunction submitComment() {const input = document.getElementById('commentInput');if (!input.value.trim() || !activeVideoId) return;// Add to array database memory trackercommentsDb[activeVideoId].push({user: "@you",text: input.value});// Update the comment metric displays instantly on targeted cardsconst activeCard = document.querySelector(.video-card[data-id="\${activeVideoId}"]);if (activeCard) {const commentCounter = activeCard.querySelector('.count-comments');commentCounter.innerText = commentsDb[activeVideoId].length;}// Re-render display view lists and clear fieldsopenComments(activeVideoId);input.value = "";}// Send Button / Link Share Simulation Alert Actionfunction triggerShare() {const toast = document.getElementById('toast');toast.classList.add('show');setTimeout(() => toast.classList.remove('show'), 2000);}// Auto-scrolling viewport focus monitor scriptconst observer = new IntersectionObserver((entries) => {entries.forEach(entry => {const video = entry.target.querySelector('video');if (entry.isIntersecting) {closeComments();video.muted = false;video.play().catch(() => {});} else {video.pause();video.currentTime = 0;}});}, { root: feedContainer, threshold: 0.6 });document.querySelectorAll('.video-card').forEach(card => observer.observe(card));
